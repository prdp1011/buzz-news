services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: genznews
      POSTGRES_PASSWORD: genznews_secret
      POSTGRES_DB: genznews
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genznews"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://genznews:genznews_secret@postgres:5432/genznews
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://genznews:genznews_secret@postgres:5432/genznews
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql://genznews:genznews_secret@postgres:5432/genznews
      CRON_INTERVAL_MS: 3600000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
